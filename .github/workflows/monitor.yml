name: Air Quality Monitor

on:
  schedule:
    - cron: '0 * * * *'  # Every hour on the hour
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Run air quality monitor
        id: monitor
        run: python code/smell_monitor.py
        env:
          PURPLEAIR_API_KEY: ${{ secrets.PURPLEAIR_API_KEY }}
          # Optional — set these secrets to enable email alerts:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}

      - name: Trigger SE wind alert
        if: steps.monitor.outputs.se_wind == 'true'
        continue-on-error: true
        run: |
          gh workflow run se-wind-alert.yml \
            -f wind_dir="${{ steps.monitor.outputs.wind_dir }}" \
            -f wind_speed="${{ steps.monitor.outputs.wind_speed }}" \
            -f risk_level="${{ steps.monitor.outputs.risk_level }}" \
            -f risk_score="${{ steps.monitor.outputs.risk_score }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html data/monitor_history.json
          git diff --staged --quiet || git commit -m "update air quality status"
          git pull --rebase origin main
          git push

